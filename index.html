<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Фэнтези Арена</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header">
            <h1>⚔️ Фэнтези Арена</h1>
            <div id="coinsDisplay">💰 Загрузка... | 💎 0 | 🎯 Ур. 1 | ⚡ 100/100</div>
        </div>

        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab-btn active" onclick="App.switchTab('games')">🎮 Игры</button>
            <button class="tab-btn" onclick="App.switchTab('actions')">⚡ Действия</button>
            <button class="tab-btn" onclick="App.switchTab('shop')">🛒 Магазин</button>
            <button class="tab-btn" onclick="App.switchTab('business')">💼 Бизнес</button>
            <button class="tab-btn" onclick="App.switchTab('profile')">👤 Профиль</button>
        </div>

        <!-- КОНТЕНТ -->
        <div id="tabContent"></div>
    </div>

    <!-- Порядок загрузки важен -->
    <script src="data/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/games/minesweeper.js"></script>
    <script src="js/games/slots.js"></script>
    <script src="js/games/dice.js"></script>
    <script src="js/games/coin.js"></script>
    <script src="js/games/roulette.js"></script>
    <script src="js/games/va-bank.js"></script>
    <script src="js/actions/adventures.js"></script>
    <script src="js/actions/boss.js"></script>
    <script src="js/shop/shop.js"></script>
    <script src="js/shop/inventory.js"></script>
    <script src="js/business/business.js"></script>
    <script src="js/business/farm.js"></script>
    <script src="js/business/mine.js"></script>
    <script src="js/business/exchange.js"></script>
    <script src="js/profile/profile.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
